aid: delta-lake
name: Delta Lake
description: >-
  Delta Lake is a graduated project of the Linux Foundation AI & Data
  Foundation providing an open source storage framework for building
  Lakehouse architectures. Originally contributed by Databricks, it adds
  reliability, quality, and performance to data lakes with ACID
  transactions, schema enforcement, time travel, and Iceberg/Hudi
  interoperability via UniForm. Delta Lake projects also include
  Delta Sharing (an open protocol for secure data sharing) and
  catalog-managed tables built on the Iceberg REST Catalog protocol.
