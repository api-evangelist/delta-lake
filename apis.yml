apis:
  - aid: delta-lake:delta-lake-storage
    name: Delta Lake Storage Framework
    description: >-
      The Delta Lake storage framework defines the on-disk transaction log
      and protocol that adds ACID transactions, schema enforcement, and
      time travel to Parquet-based data lakes. Delta Lake exposes Spark,
      Rust, and Python APIs (delta-spark, delta-rs, deltalake) rather
      than a network API.
    humanURL: https://docs.delta.io/
    tags:
      - Lakehouse
      - Protocol
      - Storage
      - Transaction Log
    properties:
      - type: Documentation
        url: https://docs.delta.io/
      - type: Protocol
        url: https://github.com/delta-io/delta/blob/master/PROTOCOL.md
      - type: SourceCode
        url: https://github.com/delta-io/delta
      - type: Releases
        url: https://github.com/delta-io/delta/releases
  - aid: delta-lake:delta-sharing
    name: Delta Sharing Protocol
    description: >-
      Delta Sharing is an open protocol for secure data sharing across
      organizations, defined as a REST API specification. Sharing servers
      expose endpoints for listing shares, schemas, and tables, and for
      retrieving signed URLs to underlying data files.
    humanURL: https://delta.io/sharing/
    tags:
      - Data Sharing
      - Open Protocol
      - REST
    properties:
      - type: Documentation
        url: https://github.com/delta-io/delta-sharing
      - type: Protocol
        url: https://github.com/delta-io/delta-sharing/blob/main/PROTOCOL.md
      - type: SourceCode
        url: https://github.com/delta-io/delta-sharing
  - aid: delta-lake:delta-catalog
    name: Delta Catalog-Managed Tables
    description: >-
      Catalog-managed Delta tables delegate table scan planning to an
      external catalog using the Iceberg REST Catalog protocol, enabling
      interoperability with Unity Catalog and other catalog services.
    humanURL: https://delta.io/blog/2026-02-02-delta-catalog-managed-tables/
    tags:
      - Catalog
      - Iceberg REST
      - Interoperability
    properties:
      - type: Documentation
        url: https://delta.io/blog/2026-02-02-delta-catalog-managed-tables/
      - type: Protocol
        url: https://github.com/delta-io/delta/blob/master/PROTOCOL.md
